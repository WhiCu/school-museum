<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экспозиция — Музей «Страницы истории»</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ═══════════ НАВИГАЦИЯ ═══════════ -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-text">Музей «Страницы истории»</span>
            </a>
            <nav class="nav" id="nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="index.html#exhibitions" class="nav-link">Экспозиции</a>
                <a href="index.html#news" class="nav-link">Новости</a>
                <a href="index.html#contacts" class="nav-link">Контакты</a>
                <a href="admin.html" class="nav-link nav-link--admin">Админ</a>
            </nav>
            <button class="burger" id="burger" aria-label="Меню">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main>

        <!-- ═══════════ HERO ЭКСПОЗИЦИИ ═══════════ -->
        <section class="ex-hero" id="ex-hero">
            <div class="ex-hero-overlay"></div>
            <div class="ex-hero-content">
                <a href="index.html#exhibitions" class="ex-back-link">← Все экспозиции</a>
                <h1 class="ex-hero-title" id="ex-title">Загрузка...</h1>
                <p class="ex-hero-desc" id="ex-description"></p>
            </div>
        </section>

        <!-- ═══════════ ОПИСАНИЕ ═══════════ -->
        <section class="section ex-about" id="ex-about">
            <div class="container">
                <div class="ex-about-block" id="ex-about-block" style="display:none;">
                    <div class="section-label">Об экспозиции</div>
                    <div class="ex-about-text" id="ex-about-text"></div>
                </div>
            </div>
        </section>

        <!-- ═══════════ ЭКСПОНАТЫ ═══════════ -->
        <section class="section ex-exhibits">
            <div class="container">
                <div class="section-label">Экспонаты</div>
                <h2 class="section-title">Коллекция экспозиции</h2>
                <div id="exhibits-grid" class="exhibits-grid">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Загрузка экспонатов...</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- ═══════════ FOOTER ═══════════ -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <span>Музей «Страницы истории»</span>
                </div>
                <p class="footer-copy">&copy; 2026 Лицей №86 г. Ярославля. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <!-- Модальное окно экспоната -->
    <div class="modal-overlay" id="exhibit-modal">
        <div class="modal-dialog modal-dialog--wide">
            <button class="modal-close" id="exhibit-modal-close">&times;</button>
            <div class="modal-body" id="exhibit-modal-body"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/exhibition.js"></script>
</body>
</html>
